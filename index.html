<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa de Personajes - Gestor Literario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splash">
        <div class="splash-content">
            <div class="splash-icon">🕸️</div>
            <div class="splash-title">Mapa de Personajes</div>
            <div class="splash-subtitle">Visualiza tus relaciones</div>
        </div>
    </div>

    <!-- Contenedor principal -->
    <div class="app-container" id="appContainer" style="display: none;">
        <div class="header">
            <h1>📖 Mis Obras Literarias</h1>
            <button class="btn-add" onclick="mostrarModalObra()">+ Nueva Obra</button>
        </div>
        <div class="obras-grid" id="obrasGrid"></div>
    </div>

    <!-- Ventana de obra -->
    <div class="obra-window" id="obraWindow">
        <div class="obra-header">
            <h2 id="obraTituloWindow"></h2>
            <div class="obra-header-buttons">
                <button class="btn-back" onclick="cerrarObraWindow()">← Volver</button>
                <button class="btn-add" onclick="mostrarModalPersonaje()">+ Personaje</button>
            </div>
        </div>
        
        <div class="obra-content">
            <div class="tabs">
                <div class="tab active" onclick="cambiarTab('personajes')">Personajes</div>
                <div class="tab" onclick="cambiarTab('mapa')">Mapa de Relaciones</div>
            </div>

            <div id="tabPersonajes" class="tab-content">
                <div class="personajes-grid" id="personajesGrid"></div>
            </div>

            <div id="tabMapa" class="tab-content" style="display: none;">
                <div class="controles-mapa">
                    <button class="btn-add small" onclick="reorganizarMapa()">↺ Reorganizar</button>
                    <span class="info-mapa">Arrastra los nodos para reubicarlos</span>
                </div>
                <div class="mapa-container" id="mapaContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modales -->
    <div class="modal" id="modalObra">
        <div class="modal-content">
            <h2>📕 Nueva Obra</h2>
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="obraTitulo" placeholder="Ej: Mi Novela">
            </div>
            <div class="form-group">
                <label>Género</label>
                <input type="text" id="obraGenero" placeholder="Ej: Novela">
            </div>
            <button class="btn-add" onclick="guardarObra()">Guardar Obra</button>
            <button class="btn-back" onclick="cerrarModal('modalObra')">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="modalPersonaje">
        <div class="modal-content">
            <h2 id="modalPersonajeTitulo">👤 Nuevo Personaje</h2>
            <input type="hidden" id="personajeId">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="personajeNombre" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label>Género</label>
                <select id="personajeGenero">
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                </select>
            </div>
            <div class="form-group">
                <label>Edad</label>
                <input type="number" id="personajeEdad" placeholder="Edad">
            </div>
            <button class="btn-add" onclick="guardarPersonaje()">Guardar</button>
            <button class="btn-back" onclick="cerrarModal('modalPersonaje')">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="modalRelacion">
        <div class="modal-content">
            <h2>🔗 Nueva Relación</h2>
            <input type="hidden" id="relacionOrigenId">
            <div class="form-group">
                <label>Tipo de relación</label>
                <select id="tipoRelacion">
                    <option value="padre">👨 Padre de</option>
                    <option value="madre">👩 Madre de</option>
                    <option value="hermano">🤝 Hermano de</option>
                    <option value="hermana">🤝 Hermana de</option>
                    <option value="hijo">🧒 Hijo de</option>
                    <option value="hija">👧 Hija de</option>
                    <option value="esposo">💍 Esposo de</option>
                    <option value="esposa">💍 Esposa de</option>
                    <option value="novio">💕 Novio de</option>
                    <option value="novia">💕 Novia de</option>
                    <option value="amante">💔 Amante de</option>
                    <option value="amigo">😊 Amigo de</option>
                    <option value="amiga">😊 Amiga de</option>
                    <option value="enemigo">⚔️ Enemigo de</option>
                    <option value="enemiga">⚔️ Enemiga de</option>
                </select>
            </div>
            <div class="form-group">
                <label>Con quién</label>
                <select id="personajeDestino">
                    <option value="">Seleccionar...</option>
                </select>
            </div>
            <button class="btn-add" onclick="guardarRelacion()">Guardar Relación</button>
            <button class="btn-back" onclick="cerrarModal('modalRelacion')">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="modalConfirmar">
        <div class="modal-content">
            <h2>⚠️ Confirmar</h2>
            <p id="confirmarMensaje">¿Estás seguro?</p>
            <button class="btn-add danger" onclick="ejecutarEliminar()">Sí, eliminar</button>
            <button class="btn-back" onclick="cerrarModal('modalConfirmar')">Cancelar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
