<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Árbol de Personajes - Gestor Literario</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Splash Screen (cargado desde splash.html) -->
    <div id="splash-container"></div>

    <!-- Contenedor principal -->
    <div class="app-container" id="appContainer" style="display: none;">
        <div class="header">
            <h1>📖 Mis Obras Literarias</h1>
            <button class="btn-add" onclick="mostrarModalObra()">+ Nueva Obra</button>
        </div>
        <div class="obras-grid" id="obrasGrid"></div>
    </div>

    <!-- Ventana de obra -->
    <div class="obra-window" id="obraWindow">
        <div class="obra-header">
            <h2 id="obraTituloWindow"></h2>
            <div class="obra-header-buttons">
                <button class="btn-back" onclick="cerrarObraWindow()">← Volver</button>
                <button class="btn-add" onclick="mostrarModalPersonaje()">+ Personaje</button>
            </div>
        </div>
        
        <div class="obra-content">
            <div class="tabs">
                <div class="tab active" onclick="cambiarTab('personajes')">Personajes</div>
                <div class="tab" onclick="cambiarTab('relaciones')">Lista Relaciones</div>
                <div class="tab" onclick="cambiarTab('arbol')">Árbol de Relaciones</div>
            </div>

            <div id="tabPersonajes" class="tab-content">
                <div class="personajes-grid" id="personajesGrid"></div>
            </div>

            <div id="tabRelaciones" class="tab-content" style="display: none;">
                <div id="relacionesList"></div>
            </div>

            <div id="tabArbol" class="tab-content" style="display: none;">
                <div class="leyenda" id="leyendaArbol"></div>
                <div class="arbol-container" id="arbolGenealogico"></div>
            </div>
        </div>
    </div>

    <!-- Modales -->
    <div class="modal" id="modalObra">
        <div class="modal-content">
            <h2>📕 Nueva Obra</h2>
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="obraTitulo" placeholder="Ej: Mi Novela">
            </div>
            <div class="form-group">
                <label>Género literario</label>
                <input type="text" id="obraGenero" placeholder="Ej: Novela, Drama...">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea id="obraDescripcion" placeholder="Breve descripción..."></textarea>
            </div>
            <button class="btn-add" onclick="guardarObra()">Guardar Obra</button>
            <button class="btn-back" onclick="cerrarModal('modalObra')" style="margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="modalPersonaje">
        <div class="modal-content">
            <h2 id="modalPersonajeTitulo">👤 Nuevo Personaje</h2>
            <input type="hidden" id="personajeId">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="personajeNombre" placeholder="Nombre completo">
            </div>
            <div class="form-group">
                <label>Género</label>
                <select id="personajeGenero">
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                </select>
            </div>
            <div class="form-group">
                <label>Edad</label>
                <input type="number" id="personajeEdad" placeholder="Edad">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea id="personajeDescripcion" placeholder="Describe al personaje..."></textarea>
            </div>
            <button class="btn-add" onclick="guardarPersonaje()">Guardar</button>
            <button class="btn-back" onclick="cerrarModal('modalPersonaje')" style="margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="modalRelacion">
        <div class="modal-content">
            <h2>🔗 Nueva Relación</h2>
            <div id="relacionPaso1">
                <h3 style="margin-bottom: 15px;">¿Con quién se relaciona?</h3>
                <div class="personaje-selector" id="selectorPersonajes"></div>
            </div>
            <div id="relacionPaso2" style="display: none;">
                <h3 id="relacionTituloPaso2"></h3>
                <div class="form-group">
                    <label>Tipo de relación</label>
                    <select id="tipoRelacion" size="5" style="height: auto;"></select>
                </div>
                <button class="btn-add" onclick="guardarRelacion()">Guardar Relación</button>
            </div>
            <button class="btn-back" onclick="cerrarModal('modalRelacion')" style="margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <div class="modal" id="modalConfirmar">
        <div class="modal-content">
            <h2>⚠️ Confirmar</h2>
            <p id="confirmarMensaje" style="margin: 20px 0;">¿Estás seguro?</p>
            <button class="btn-add danger" onclick="ejecutarEliminar()">Sí, eliminar</button>
            <button class="btn-back" onclick="cerrarModal('modalConfirmar')" style="margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
